services:
  mcp-server:
    build: .
    container_name: mcp-server
    command: python -m services.mcp_server
    ports:
      - "8001:8001"
    volumes:
      - db_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/sse')"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: security-aggregator
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MCP_SERVER_URL=http://mcp-server:8001/sse
    volumes:
      - db_data:/app/data
    depends_on:
      mcp-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
